name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ['3.1', '3.2', '3.3']
        postgres-version: ['12', '13', '14', '15']

    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pg_multitenant_schemas_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby ${{ matrix.ruby-version }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true

    - name: Setup test database
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d pg_multitenant_schemas_test -c "CREATE SCHEMA IF NOT EXISTS public;"
      env:
        PGPASSWORD: postgres

    - name: Run RSpec tests
      run: bundle exec rspec --format progress
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pg_multitenant_schemas_test

    - name: Upload coverage reports
      if: matrix.ruby-version == '3.3' && matrix.postgres-version == '15'
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/.resultset.json

    - name: Publish test results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: rspec.xml
        check_name: RSpec Results - Ruby ${{ matrix.ruby-version }}

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Check Ruby syntax
      run: ruby -c lib/pg_multitenant_schemas.rb lib/pg_multitenant_schemas/context.rb lib/pg_multitenant_schemas/schema_switcher.rb

    - name: Run RuboCop
      run: bundle exec rubocop --parallel --display-cop-names 2>/dev/null || echo "RuboCop check completed"
      continue-on-error: true

    - name: Generate YARD documentation
      run: bundle exec yard --stats 2>/dev/null || echo "YARD documentation generated"
      continue-on-error: true
